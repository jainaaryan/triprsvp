<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP Confirmed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #4a5568 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.25);
            text-align: center;
            max-width: 560px;
            width: 100%;
        }

        .checkmark {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d4a6f 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
        }

        h1 {
            color: #1e293b;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .subtitle {
            color: #64748b;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .form-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d4a6f 100%);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(30, 58, 95, 0.25);
            transition: all 0.3s ease;
        }

        .form-link svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .form-link:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(30, 58, 95, 0.35);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark">✓</div>
        <h1>We knew you'd say Yes!</h1>
        <p class="subtitle">Opening the form in a new tab. If it didn't open, use the button below:</p>
        <a
            class="form-link"
            href="https://forms.gle/KyUSgrbQB4qAyhDB7"
            target="_blank"
            rel="noopener noreferrer"
        >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
            </svg>
            Dates Availability Form
        </a>
    </div>

    <script>
        window.open('https://forms.gle/KyUSgrbQB4qAyhDB7', '_blank', 'noopener');
    </script>
</body>
</html>
